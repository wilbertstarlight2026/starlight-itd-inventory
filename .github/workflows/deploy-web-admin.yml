name: Deploy Web Admin to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --workspace=apps/web-admin --workspace=shared

      - name: Build web admin
        run: npm run build --workspace=apps/web-admin
        env:
          VITE_BASE_PATH: /starlight-itd-inventory/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Add 404.html for SPA routing
        run: cp apps/web-admin/dist/index.html apps/web-admin/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-admin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
